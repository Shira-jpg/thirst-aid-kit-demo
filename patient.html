  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #111827; }
    header { background: #0f4c81; color: white; padding: 18px; text-align: center; }
    main { max-width: 620px; margin: 18px auto; padding: 0 14px 30px; }
    .card { background: white; border-radius: 14px; padding: 16px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

    input[type="range"] { width: 100%; }
    .value { font-weight: normal; color: #374151; }
    button { width: 100%; border: none; border-radius: 10px; padding: 14px; margin-top: 10px; font-size: 16px; cursor: pointer; }
    .normal { background: #d1fae5; }
    .medium { background: #fef3c7; }
    .danger { background: #fee2e2; }
    .primary { background: #0f4c81; color: white; }
    .alert { background: #b91c1c; color: white; font-weight: bold; }
    .status { padding: 10px; border-radius: 10px; background: #e5e7eb; margin-top: 10px; }
    .warn { background: #fff7ed; color: #9a3412; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .metric { background: #f3f4f6; padding: 10px; border-radius: 10px; }
    .metric b { display: block; font-size: 18px; }
  </style>

<body>
  <header>
    <h1>Patient App</h1>
    <p>The Thirst Aid Kit - Smart Cup Simulator</p>
  </header>

  <main>
    <div class="card">
      <h2>Firebase Status</h2>
      <div id="firebaseStatus" class="status"></div>
    </div>

    <div class="card">
      <h2>Simulated Sensor Readings</h2>
      <label>Temperature: <span class="value" id="temperatureVal">36.8</span> °C</label>
      <input id="temperature" type="range" min="35.5" max="39.5" step="0.1" value="36.8" />

      <label>Pulse: <span class="value" id="pulseVal">82</span> BPM</label>
      <input id="pulse" type="range" min="55" max="125" step="1" value="82" />

      <label>Saliva Conductivity: <span class="value" id="conductivityVal">540</span></label>
      <input id="conductivity" type="range" min="400" max="950" step="10" value="540" />

      <label>Daily Intake: <span class="value" id="intakeVal">1100</span> ml</label>
      <input id="intake" type="range" min="0" max="1800" step="50" value="1100" />

      <label>Minutes Since Last Sip: <span class="value" id="minutesVal">20</span> min</label>
      <input id="minutes" type="range" min="0" max="240" step="5" value="20" />
    </div>

    <div class="card">
      <h2>Demo Actions</h2>
      <button class="normal" onclick="presetNormal()">Set Normal Reading</button>
      <button class="medium" onclick="presetMedium()">Set Medium Risk Reading</button>
      <button class="danger" onclick="presetHigh()">Set High Risk Reading</button>
      <button class="primary" onclick="sendReading(false)">Send Current Reading</button>
      <button class="alert" onclick="sendReading(true)">Force High Risk Alert</button>
      <div id="sendStatus" class="status">No reading sent yet.</div>
    </div>

    <div class="card">
      <h2>Current Calculated Status</h2>
      <div class="grid">
        <div class="metric">Risk Level<b id="riskLevel">Low</b></div>
        <div class="metric">Risk Score<b id="riskScore">10</b></div>
      </div>
      <p id="riskReason">All readings are within normal demo thresholds.</p>
    </div>
  </main>

<script>
  const fields = ["temperature", "pulse", "conductivity", "intake", "minutes"];
  function number(id) { return Number(document.getElementById(id).value); }

  function updateDisplay() {
    document.getElementById("temperatureVal").textContent = number("temperature").toFixed(1);
    document.getElementById("pulseVal").textContent = number("pulse");
    document.getElementById("conductivityVal").textContent = number("conductivity");
    document.getElementById("intakeVal").textContent = number("intake");
    document.getElementById("minutesVal").textContent = number("minutes");
    const result = calculateRisk(false);
    document.getElementById("riskLevel").textContent = result.level;
    document.getElementById("riskScore").textContent = result.score;
    document.getElementById("riskReason").textContent = result.reason;
  }

  fields.forEach(id => document.getElementById(id).addEventListener("input", updateDisplay));

  function calculateRisk(forceAlert) {
    const temp = number("temperature");
    const pulse = number("pulse");
    const cond = number("conductivity");
    const intake = number("intake");
    const minutes = number("minutes");

    if (forceAlert) return { level: "High", score: 100, reason: "Forced high-risk alert for demo." };
    if (cond >= 800 || minutes >= 180 || pulse >= 105 || temp >= 37.8) {
      return { level: "High", score: 90, reason: "One or more high-risk thresholds were crossed." };
    }
    if (cond >= 650 || minutes >= 120 || pulse >= 95 || temp >= 37.3 || intake < 700) {
      return { level: "Medium", score: 55, reason: "One or more medium-risk thresholds were crossed." };
    }
    return { level: "Low", score: 10, reason: "All readings are within normal demo thresholds." };
  }

  function setValues(temp, pulse, cond, intake, minutes) {
    document.getElementById("temperature").value = temp;
    document.getElementById("pulse").value = pulse;
    document.getElementById("conductivity").value = cond;
    document.getElementById("intake").value = intake;
    document.getElementById("minutes").value = minutes;
    updateDisplay();
  }

  function presetNormal() { setValues(36.8, 82, 540, 1100, 20); }
  function presetMedium() { setValues(37.4, 96, 680, 650, 125); }
  function presetHigh() { setValues(38.0, 110, 830, 420, 190); }

  function sendReading(forceAlert) {
    const result = calculateRisk(forceAlert);
    const reading = {
      patientName: "Demo Patient",
      temperature: number("temperature"),
      pulse: number("pulse"),
      salivaConductivity: number("conductivity"),
      dailyIntakeMl: number("intake"),
      minutesSinceLastSip: number("minutes"),
      riskLevel: result.level,
      riskScore: result.score,
      alertForced: forceAlert,
      alertReason: result.reason,
      updatedAt: Date.now()
    };

    if (!db) {
      document.getElementById("sendStatus").textContent = "Firebase config is missing. Add your Firebase keys first.";
      document.getElementById("sendStatus").className = "status warn";
      return;
    }

    db.ref("demo/current").set(reading)
      .then(() => {
        document.getElementById("sendStatus").textContent = "Reading sent to caregiver app: " + result.level + " risk.";
        document.getElementById("sendStatus").className = "status";
      })
      .catch(err => {
        document.getElementById("sendStatus").textContent = "Firebase error: " + err.message;
        document.getElementById("sendStatus").className = "status warn";
      });
  }

  document.getElementById("firebaseStatus").textContent = db ? "Connected to Firebase config. Ready for demo." : "Firebase config is missing. Paste your Firebase keys in the code.";
  document.getElementById("firebaseStatus").className = db ? "status" : "status warn";
  updateDisplay();
</script>
</body>
